<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt-Vortex — Gantt & MPM</title>
    <style>
        :root {
            --bg-dark: #1a1b2e;
            --bg-darker: #141525;
            --bg-card: #1e2039;
            --bg-elevated: #252745;
            --bg-hover: #2a2d52;
            --bg-selected: #2f3365;
            --text: #e2e4f0;
            --text-light: #8b8fa8;
            --text-muted: #5c6080;
            --border: #2e3150;
            --border-light: #262842;
            --border-hover: #3d4070;
            --input-bg: #1a1b2e;
            --section-bg: #1c1d35;
            --section-border: #3a3d6a;
            --pastel-blue: #7aa2f7;
            --pastel-purple: #b4a4de;
            --pastel-pink: #f7a4c8;
            --pastel-green: #9ece6a;
            --pastel-teal: #73daca;
            --pastel-yellow: #e0af68;
            --pastel-orange: #e8a87c;
            --pastel-red: #f7768e;
            --pastel-cyan: #7dcfff;
            --pastel-lavender: #c0a4f0;
            --pastel-mint: #a8e6cf;
            --pastel-peach: #f0b8a8;
            --pastel-sky: #89b4fa;
            --pastel-rose: #dba4c4;
            --pastel-lime: #c3e88d;
            --pastel-coral: #e89090;
            --primary: var(--pastel-blue);
            --primary-light: #90b4fa;
            --success: var(--pastel-green);
            --warning: var(--pastel-yellow);
            --danger: var(--pastel-red);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all .2s ease;
            --gantt-row-height: 40px;
            --gantt-header-height: 52px;
            --sidebar-width: 600px;
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --bg-darker: #e4e7ec;
            --bg-card: #ffffff;
            --bg-elevated: #f7f8fa;
            --bg-hover: #eef0f4;
            --bg-selected: #e8ecf4;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --border: #d1d5db;
            --border-light: #e5e7eb;
            --border-hover: #b0b6c2;
            --input-bg: #ffffff;
            --section-bg: #f3f4f6;
            --section-border: #c7cad1;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 6px 18px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            transition: background .3s, color .3s;
        }

        /* ========== HEADER ========== */
        .app-header {
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            position: relative;
            transition: background .3s;
        }

        .app-header h1 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--pastel-blue);
        }

        .app-header h1 svg {
            width: 22px;
            height: 22px;
        }

        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* ========== BUTTONS ========== */
        .btn {
            padding: 5px 11px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 11.5px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
            white-space: nowrap;
            background: var(--bg-elevated);
            color: var(--text);
            font-family: inherit;
        }

        .btn svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--pastel-blue);
            color: #141525;
            border-color: var(--pastel-blue);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
        }

        .btn-success {
            background: rgba(158, 206, 106, .15);
            color: var(--pastel-green);
            border-color: rgba(158, 206, 106, .3);
        }

        .btn-success:hover {
            background: rgba(158, 206, 106, .25);
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--border);
            color: var(--text-light);
        }

        .btn-ghost:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
        }

        .btn-icon {
            padding: 4px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-light);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-icon:hover {
            background: var(--bg-elevated);
            color: var(--text);
            border-color: var(--border);
        }

        .btn-icon svg {
            width: 15px;
            height: 15px;
        }

        .btn-danger-text {
            color: var(--pastel-red);
        }

        /* ========== TOOLBAR ========== */
        .toolbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 5px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            transition: background .3s;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .toolbar-separator {
            width: 1px;
            height: 18px;
            background: var(--border);
            margin: 0 2px;
        }

        .zoom-controls {
            display: flex;
            gap: 2px;
            background: var(--bg-darker);
            border-radius: var(--radius);
            padding: 2px;
            border: 1px solid var(--border);
        }

        .zoom-controls .btn {
            padding: 3px 9px;
            background: transparent;
            border: none;
            color: var(--text-light);
            border-radius: 5px;
            font-size: 10.5px;
        }

        .zoom-controls .btn:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .zoom-controls .btn.active {
            background: var(--bg-elevated);
            color: var(--pastel-blue);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15);
        }

        .zoom-label {
            font-size: 10.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .project-name-input {
            border: 1px solid transparent;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--radius);
            background: transparent;
            color: var(--text);
            min-width: 140px;
            transition: var(--transition);
            font-family: inherit;
        }

        .project-name-input:hover {
            border-color: var(--border);
            background: var(--bg-elevated);
        }

        .project-name-input:focus {
            outline: none;
            border-color: var(--pastel-blue);
            background: var(--bg-elevated);
        }

        /* ========== VIEW TABS ========== */
        .view-tabs {
            display: flex;
            gap: 2px;
            background: var(--bg-darker);
            border-radius: var(--radius);
            padding: 2px;
            border: 1px solid var(--border);
        }

        .view-tab {
            padding: 4px 12px;
            background: transparent;
            border: none;
            color: var(--text-light);
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: var(--transition);
        }

        .view-tab:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .view-tab.active {
            background: var(--bg-elevated);
            color: var(--pastel-blue);
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15);
        }

        /* ========== MAIN ========== */
        .main-container {
            display: flex;
            height: calc(100vh - 48px - 36px);
            overflow: hidden;
        }

        /* ========== TABLE PANEL ========== */
        .table-panel {
            width: var(--sidebar-width);
            min-width: 380px;
            max-width: 800px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: background .3s;
        }

        .table-header {
            display: grid;
            grid-template-columns: 26px 16px 1fr 82px 82px 44px 88px 28px;
            gap: 0;
            padding: 0 3px;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border);
            height: var(--gantt-header-height);
            align-items: center;
            font-size: 9.5px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .6px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table-header>div {
            padding: 0 2px;
            user-select: none;
        }

        .table-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .section-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 7px;
            background: var(--section-bg);
            border-bottom: 1px solid var(--section-border);
            border-top: 1px solid var(--section-border);
            font-size: 11.5px;
            font-weight: 700;
            color: var(--pastel-purple);
            cursor: pointer;
            user-select: none;
            transition: background .15s;
        }

        .section-row:hover {
            background: var(--bg-hover);
        }

        .section-row svg {
            width: 13px;
            height: 13px;
            transition: transform .2s;
        }

        .section-row.collapsed svg {
            transform: rotate(-90deg);
        }

        .section-row .sec-name {
            flex: 1;
            border: none;
            background: transparent;
            color: inherit;
            font: inherit;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: text;
        }

        .section-row .sec-name:focus {
            outline: none;
            background: var(--bg-elevated);
        }

        .sec-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity .15s;
        }

        .section-row:hover .sec-actions {
            opacity: 1;
        }

        .table-row {
            display: grid;
            grid-template-columns: 26px 16px 1fr 82px 82px 44px 88px 28px;
            gap: 0;
            padding: 0 3px;
            border-bottom: 1px solid var(--border-light);
            min-height: var(--gantt-row-height);
            align-items: center;
            transition: background .1s;
            cursor: pointer;
        }

        .table-row:hover {
            background: var(--bg-hover);
        }

        .table-row.selected {
            background: var(--bg-selected);
            box-shadow: inset 3px 0 0 var(--pastel-blue);
        }

        .table-row.drag-over {
            box-shadow: inset 0 -2px 0 var(--pastel-blue);
        }

        .table-row input,
        .table-row select {
            width: 100%;
            border: 1px solid transparent;
            padding: 3px 4px;
            font-size: 11.5px;
            border-radius: 4px;
            background: transparent;
            color: var(--text);
            transition: var(--transition);
            font-family: inherit;
        }

        .table-row input:hover {
            border-color: var(--border);
            background: var(--input-bg);
        }

        .table-row input:focus {
            outline: none;
            border-color: var(--pastel-blue);
            background: var(--input-bg);
            box-shadow: 0 0 0 2px rgba(122, 162, 247, .1);
        }

        .table-row input[type="date"] {
            font-size: 10px;
            color: var(--text-light);
        }

        .table-row input:disabled {
            opacity: .2;
            cursor: not-allowed;
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: .2;
            transition: opacity .15s;
            padding: 2px;
        }

        .table-row:hover .drag-handle {
            opacity: .7;
        }

        .drag-handle svg {
            width: 11px;
            height: 11px;
        }

        .color-dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .color-dot:hover {
            transform: scale(1.3);
            border-color: rgba(255, 255, 255, .2);
        }

        .date-cell {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .date-lock {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .date-lock:hover {
            border-color: var(--pastel-blue);
        }

        .date-lock.active {
            background: var(--pastel-blue);
            border-color: var(--pastel-blue);
        }

        .date-lock svg {
            width: 8px;
            height: 8px;
            color: white;
            display: none;
        }

        .date-lock.active svg {
            display: block;
        }

        .dep-display {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            min-height: 18px;
            align-items: center;
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            transition: background .15s;
        }

        .dep-display:hover {
            background: var(--input-bg);
        }

        .dep-tag {
            background: rgba(122, 162, 247, .15);
            color: var(--pastel-blue);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 500;
            white-space: nowrap;
        }

        .dep-none {
            font-size: 9.5px;
            color: var(--text-muted);
        }

        .row-del {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 2px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .table-row:hover .row-del {
            opacity: 1;
        }

        .row-del:hover {
            background: rgba(247, 118, 142, .15);
            color: var(--pastel-red);
        }

        .add-row {
            padding: 5px 8px;
        }

        .add-btn {
            width: 100%;
            padding: 7px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 11.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: var(--transition);
            font-family: inherit;
        }

        .add-btn:hover {
            border-color: var(--pastel-blue);
            color: var(--pastel-blue);
            background: rgba(122, 162, 247, .04);
        }

        /* ========== RESIZER ========== */
        .panel-resizer {
            width: 3px;
            background: var(--border);
            cursor: col-resize;
            transition: background .2s;
            z-index: 5;
        }

        .panel-resizer:hover,
        .panel-resizer.active {
            background: var(--pastel-blue);
        }

        /* ========== GANTT PANEL ========== */
        .gantt-panel {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--bg-card);
            transition: background .3s;
        }

        .gantt-container {
            position: relative;
            min-height: 100%;
        }

        .gantt-timeline-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .gantt-header-row {
            display: flex;
            height: 26px;
            align-items: center;
        }

        .gantt-header-cell {
            text-align: center;
            font-size: 9.5px;
            font-weight: 600;
            color: var(--text-muted);
            border-right: 1px solid var(--border-light);
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .gantt-header-cell.weekend {
            background: rgba(247, 118, 142, .04);
            color: var(--pastel-red);
            opacity: .7;
        }

        .gantt-header-cell.today-h {
            background: rgba(122, 162, 247, .1);
            color: var(--pastel-blue);
        }

        .gantt-header-cell.month-h {
            font-size: 10.5px;
            color: var(--text-light);
            border-right: 1px solid var(--border);
            letter-spacing: .3px;
        }

        .gantt-body {
            position: relative;
        }

        .gantt-grid-row {
            height: var(--gantt-row-height);
            border-bottom: 1px solid var(--border-light);
            display: flex;
        }

        .gantt-grid-row.sec-spacer {
            height: 31px;
            background: var(--section-bg);
        }

        .gantt-cell {
            height: 100%;
            border-right: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .gantt-cell.weekend {
            background: rgba(247, 118, 142, .025);
        }

        .gantt-cell.today-c {
            background: rgba(122, 162, 247, .05);
        }

        .gantt-bars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .gantt-bar-wrap {
            position: absolute;
            height: var(--gantt-row-height);
            display: flex;
            align-items: center;
            padding: 5px 0;
            pointer-events: all;
        }

        .gantt-bar {
            height: 28px;
            border-radius: 6px;
            position: relative;
            cursor: grab;
            transition: box-shadow .15s, transform .1s;
            display: flex;
            align-items: center;
            overflow: hidden;
            min-width: 8px;
        }

        .gantt-bar:hover {
            box-shadow: 0 2px 10px rgba(0, 0, 0, .25);
            transform: translateY(-1px);
        }

        .gantt-bar:active {
            cursor: grabbing;
        }

        .gantt-bar-label {
            font-size: 10px;
            color: #141525;
            padding: 0 7px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 1;
            font-weight: 600;
        }

        [data-theme="light"] .gantt-bar-label {
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .2);
        }

        .gantt-resize {
            position: absolute;
            top: 0;
            width: 8px;
            height: 100%;
            cursor: ew-resize;
            z-index: 2;
        }

        .gantt-resize.l {
            left: 0;
            border-radius: 6px 0 0 6px;
        }

        .gantt-resize.r {
            right: 0;
            border-radius: 0 6px 6px 0;
        }

        .gantt-resize:hover {
            background: rgba(0, 0, 0, .12);
        }

        .today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--pastel-red);
            z-index: 5;
            pointer-events: none;
            opacity: .6;
        }

        .dep-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        .dep-path {
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            opacity: .5;
        }

        .dep-arrowhead {
            fill: var(--text-muted);
            opacity: .5;
        }

        /* ========== MPM PANEL ========== */
        .mpm-panel {
            flex: 1;
            overflow: auto;
            background: var(--bg-card);
            padding: 20px;
            display: none;
            transition: background .3s;
        }

        .mpm-panel.active {
            display: block;
        }

        .mpm-canvas {
            position: relative;
            min-width: 100%;
            min-height: 100%;
        }

        .mpm-node {
            position: absolute;
            width: 140px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-elevated);
            box-shadow: var(--shadow);
            cursor: default;
            user-select: none;
            transition: box-shadow .2s, border-color .2s;
        }

        .mpm-node:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--border-hover);
        }

        .mpm-node-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
        }

        .mpm-node-header>div {
            padding: 6px 8px;
            flex: 1;
            text-align: center;
        }

        .mpm-node-header>div:first-child {
            border-right: 1px solid var(--border);
            color: var(--text);
        }

        .mpm-node-header>div:last-child {
            color: var(--pastel-teal);
        }

        .mpm-node-body {
            padding: 6px 8px;
            text-align: center;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mpm-node-footer {
            display: flex;
            justify-content: space-between;
            font-size: 10.5px;
        }

        .mpm-node-footer>div {
            padding: 5px 8px;
            flex: 1;
            text-align: center;
        }

        .mpm-node-footer>div:first-child {
            border-right: 1px solid var(--border);
            color: var(--pastel-orange);
        }

        .mpm-node-footer>div:last-child {
            font-weight: 700;
        }

        .mpm-node-footer .marge-zero {
            color: var(--pastel-red);
        }

        .mpm-node-footer .marge-pos {
            color: var(--pastel-green);
        }

        .mpm-node.critical {
            border-color: var(--pastel-red);
            box-shadow: 0 0 0 2px rgba(247, 118, 142, .2);
        }

        .mpm-legend {
            position: sticky;
            top: 0;
            background: var(--bg-card);
            padding: 8px 0 16px;
            z-index: 5;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .mpm-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-light);
        }

        .mpm-legend-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 2px solid var(--border);
        }

        .mpm-legend-box.crit {
            border-color: var(--pastel-red);
            background: rgba(247, 118, 142, .1);
        }

        .mpm-arrow-svg {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, .55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all .2s ease;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 92%;
            max-width: 440px;
            max-height: 82vh;
            overflow-y: auto;
            transform: translateY(14px) scale(.98);
            transition: transform .2s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 13.5px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 3px;
            border-radius: 4px;
            display: flex;
        }

        .modal-close:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .modal-body {
            padding: 18px;
        }

        .modal-footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        .form-group {
            margin-bottom: 11px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 6px 9px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12.5px;
            color: var(--text);
            background: var(--input-bg);
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--pastel-blue);
            box-shadow: 0 0 0 3px rgba(122, 162, 247, .1);
        }

        .form-group select[multiple] {
            min-height: 75px;
        }

        .form-group select option {
            background: var(--input-bg);
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
        }

        .color-opts {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .color-opt {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }

        .color-opt:hover {
            transform: scale(1.2);
        }

        .color-opt.sel {
            border-color: var(--text);
            box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px rgba(255, 255, 255, .3);
            transform: scale(1.1);
        }

        /* ========== SETTINGS ========== */
        .settings-group {
            margin-bottom: 16px;
        }

        .settings-group h4 {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
        }

        .toggle-row span {
            font-size: 12.5px;
        }

        .toggle-switch {
            width: 34px;
            height: 18px;
            background: var(--border);
            border-radius: 9px;
            cursor: pointer;
            position: relative;
            transition: background .2s;
        }

        .toggle-switch.on {
            background: var(--pastel-blue);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transition: transform .2s;
        }

        .toggle-switch.on::after {
            transform: translateX(16px);
        }

        .day-chips {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .day-chip {
            padding: 3px 9px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 11px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-elevated);
            color: var(--text-light);
            user-select: none;
        }

        .day-chip:hover {
            border-color: var(--border-hover);
        }

        .day-chip.active {
            background: rgba(247, 118, 142, .15);
            border-color: rgba(247, 118, 142, .4);
            color: var(--pastel-red);
        }

        /* ========== DROPDOWN / POPUP ========== */
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 155px;
            padding: 3px;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-5px);
            transition: all .15s ease;
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(3px);
        }

        .dropdown-menu button {
            width: 100%;
            padding: 6px 9px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 11.5px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-family: inherit;
            transition: background .1s;
        }

        .dropdown-menu button:hover {
            background: var(--bg-elevated);
        }

        .dropdown-menu button svg {
            width: 13px;
            height: 13px;
            color: var(--text-light);
            flex-shrink: 0;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 3px 0;
        }

        .popup {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            z-index: 500;
            display: none;
        }

        .popup.visible {
            display: block;
        }

        .dep-popup {
            padding: 5px;
            min-width: 160px;
            max-height: 190px;
            overflow-y: auto;
        }

        .dep-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text);
            transition: background .1s;
        }

        .dep-item:hover {
            background: var(--bg-elevated);
        }

        .dep-item input[type="checkbox"] {
            accent-color: var(--pastel-blue);
            width: 12px;
            height: 12px;
            cursor: pointer;
        }

        .color-popup {
            padding: 7px;
        }

        .color-popup-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .color-popup-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .color-popup-dot:hover {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, .2);
        }

        /* ========== CONTEXT ========== */
        .ctx-menu {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            min-width: 150px;
            padding: 3px;
            z-index: 1000;
            display: none;
        }

        .ctx-menu.visible {
            display: block;
        }

        .ctx-menu button {
            width: 100%;
            padding: 5px 9px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 11.5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-family: inherit;
        }

        .ctx-menu button:hover {
            background: var(--bg-elevated);
        }

        /* ========== TOOLTIP ========== */
        .bar-tooltip {
            position: fixed;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 10px;
            font-size: 11px;
            color: var(--text);
            box-shadow: var(--shadow-lg);
            z-index: 600;
            pointer-events: none;
            max-width: 220px;
            display: none;
        }

        .bar-tooltip.visible {
            display: block;
        }

        .bar-tooltip .tt-name {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .bar-tooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: var(--text-light);
            font-size: 10.5px;
        }

        /* ========== EMPTY ========== */
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 42px;
            height: 42px;
            margin-bottom: 8px;
            opacity: .2;
        }

        .empty-state h3 {
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--text-light);
        }

        .empty-state p {
            font-size: 11.5px;
            margin-bottom: 12px;
        }

        /* ========== TOASTS ========== */
        .toast-box {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .toast {
            background: var(--bg-elevated);
            color: var(--text);
            padding: 7px 12px;
            border-radius: var(--radius);
            font-size: 11.5px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 5px;
            animation: tIn .2s ease;
            border: 1px solid var(--border);
            max-width: 260px;
        }

        .toast.success {
            border-color: var(--pastel-green);
            color: var(--pastel-green);
        }

        .toast.error {
            border-color: var(--pastel-red);
            color: var(--pastel-red);
        }

        .toast.warning {
            border-color: var(--pastel-yellow);
            color: var(--pastel-yellow);
        }

        @keyframes tIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes tOut {
            from {
                opacity: 1
            }

            to {
                opacity: 0;
                transform: translateY(-8px)
            }
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .hidden {
            display: none !important;
        }

        /* ==============================================
   MOBILE RESPONSIVE
   ============================================== */
        .mobile-nav {
            display: none;
        }

        @media(max-width:768px) {
            .app-header h1 span.desktop-title {
                display: none;
            }

            .toolbar .desktop-only {
                display: none !important;
            }

            .main-container {
                flex-direction: column;
                position: relative;
            }

            .table-panel {
                width: 100% !important;
                min-width: 0 !important;
                max-width: 100% !important;
                display: none;
                height: 100%;
            }

            .table-panel.mob-active {
                display: flex;
            }

            .panel-resizer {
                display: none !important;
            }

            .gantt-panel {
                display: none;
                height: 100%;
            }

            .gantt-panel.mob-active {
                display: block;
            }

            .mpm-panel {
                display: none !important;
                height: 100%;
            }

            .mpm-panel.mob-active {
                display: block !important;
            }

            .table-header {
                grid-template-columns: 20px 14px 1fr 42px 80px 24px;
                font-size: 8.5px;
            }

            .table-row {
                grid-template-columns: 20px 14px 1fr 42px 80px 24px;
            }

            .table-row .mob-hide {
                display: none;
            }

            .table-header .mob-hide {
                display: none;
            }

            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--bg-darker);
                border-top: 1px solid var(--border);
                z-index: 200;
                padding: 4px 0;
                justify-content: space-around;
            }

            .mob-nav-btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                border: none;
                background: none;
                color: var(--text-muted);
                font-size: 9px;
                font-family: inherit;
                cursor: pointer;
                padding: 6px 12px;
                border-radius: 8px;
                transition: var(--transition);
            }

            .mob-nav-btn.active {
                color: var(--pastel-blue);
                background: rgba(122, 162, 247, .1);
            }

            .mob-nav-btn svg {
                width: 20px;
                height: 20px;
            }

            .main-container {
                height: calc(100vh - 48px - 36px - 52px);
            }
        }
    </style>
</head>

        <button class="mob-nav-btn" onclick="setMobView('gantt')" id="mn-gantt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <div class="ctx-menu" id="ctxMenu">
        <button onclick="editMod(CTX)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />

        <div class="dropdown-divider"></div>
        <button onclick="delT(CTX)" class="btn-danger-text"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            </svg>Supprimer</button>
    </div>
    <div class="popup dep-popup" id="depPop"></div>

    <div class="modal-overlay" id="modOvl">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modTitle">Modifier</h3><button class="modal-close" onclick="closeMod()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />

            <div class="modal-body"><input type="hidden" id="modId">
                <div class="form-group"><label>Nom</label><input type="text" id="modName"></div>
                <div class="form-row">
                    <div class="form-group"><label>Début</label><input type="date" id="modStart"></div>
                    <div class="form-group"><label>Fin</label><input type="date" id="modEnd"></div>
                </div>
                <div class="form-group"><label>Durée (jours ouvrés)</label><input type="number" id="modDur" min="1"></div>
                <div class="form-group"><label>Section</label><select id="modSec"></select></div>
                <div class="form-group"><label>Antécédents</label><select id="modDeps" multiple></select></div>
                <div class="form-group"><label>Couleur</label>
                    <div class="color-opts" id="modCols"></div>
                </div>
            </div>
            <div class="modal-footer"><button class="btn btn-ghost" onclick="closeMod()">Annuler</button><button class="btn btn-primary" onclick="saveMod()">OK</button></div>
